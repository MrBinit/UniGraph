x-local-aws-env: &local_aws_env
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
  AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
  AWS_REGION: "${AWS_REGION:-us-east-1}"
  AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
  AWS_SECRETS_MANAGER_SECRET_ID: "${AWS_SECRETS_MANAGER_SECRET_ID:-unigraph/prod/app}"
  AWS_SECRETS_MANAGER_REGION: "${AWS_SECRETS_MANAGER_REGION:-us-east-1}"
  AWS_SDK_LOAD_CONFIG: "1"

x-local-config-env: &local_config_env
  APP_CONFIG_OVERRIDE_DIR: "/app/app/config/local"

x-local-redis-env: &local_redis_env
  REDIS_LOCAL_TUNNEL_ENABLED: "${REDIS_LOCAL_TUNNEL_ENABLED:-}"
  REDIS_APP_HOST: "${REDIS_APP_HOST:-}"
  REDIS_APP_PORT: "${REDIS_APP_PORT:-}"
  REDIS_APP_DB: "${REDIS_APP_DB:-}"
  REDIS_APP_USERNAME: "${REDIS_APP_USERNAME:-}"
  REDIS_APP_PASSWORD: "${REDIS_APP_PASSWORD:-}"
  REDIS_APP_TLS: "${REDIS_APP_TLS:-}"
  REDIS_APP_SSL_CERT_REQS: "${REDIS_APP_SSL_CERT_REQS:-}"
  REDIS_APP_SSL_CA_CERTS: "${REDIS_APP_SSL_CA_CERTS:-}"
  REDIS_WORKER_HOST: "${REDIS_WORKER_HOST:-}"
  REDIS_WORKER_PORT: "${REDIS_WORKER_PORT:-}"
  REDIS_WORKER_DB: "${REDIS_WORKER_DB:-}"
  REDIS_WORKER_USERNAME: "${REDIS_WORKER_USERNAME:-}"
  REDIS_WORKER_PASSWORD: "${REDIS_WORKER_PASSWORD:-}"
  REDIS_WORKER_TLS: "${REDIS_WORKER_TLS:-}"
  REDIS_WORKER_SSL_CERT_REQS: "${REDIS_WORKER_SSL_CERT_REQS:-}"
  REDIS_WORKER_SSL_CA_CERTS: "${REDIS_WORKER_SSL_CA_CERTS:-}"

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_local_data:/data

  api:
    environment:
      <<: [*local_aws_env, *local_config_env, *local_redis_env]
      POSTGRES_ENABLED: "false"
      MIDDLEWARE_TRUSTED_PROXY_CIDRS: "127.0.0.1/32,172.16.0.0/12"
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      redis:
        condition: service_healthy

  worker:
    environment:
      <<: [*local_aws_env, *local_config_env, *local_redis_env]
      POSTGRES_ENABLED: "false"
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      redis:
        condition: service_healthy

  llm-worker:
    environment:
      <<: [*local_aws_env, *local_config_env, *local_redis_env]
      POSTGRES_ENABLED: "false"
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      redis:
        condition: service_healthy

  eval-worker:
    environment:
      <<: [*local_aws_env, *local_config_env, *local_redis_env]
      POSTGRES_ENABLED: "false"
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      redis:
        condition: service_healthy

  metrics-worker:
    environment:
      <<: [*local_aws_env, *local_config_env, *local_redis_env]
      POSTGRES_ENABLED: "false"
    volumes:
      - ./data/metrics:/app/data/metrics
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      redis:
        condition: service_healthy

  gradio:
    build:
      context: .
      dockerfile: Dockerfile.gradio
    image: ai-system-gradio:latest
    init: true
    restart: unless-stopped
    environment:
      <<: [*local_aws_env, *local_config_env, *local_redis_env]
      POSTGRES_ENABLED: "false"
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    volumes:
      - ./data/metrics:/app/data/metrics
      - ${HOME}/.aws:/home/app/.aws:ro
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  redis_local_data:
