services:
  api:
    image: ${APP_IMAGE:-ai-system:latest}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      REDIS_RUNTIME_ROLE: app
      API_WORKERS: ${API_WORKERS:-2}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:?set AWS_SECRETS_MANAGER_SECRET_ID}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-us-east-1}
    command: ["sh", "-c", "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${API_WORKERS}"]
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data/metrics:/app/data/metrics
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 20s

  worker:
    image: ${APP_IMAGE:-ai-system:latest}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      REDIS_RUNTIME_ROLE: worker
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:?set AWS_SECRETS_MANAGER_SECRET_ID}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-us-east-1}
    command: ["python", "-m", "app.scripts.summary_worker"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from app.infra.redis_client import worker_redis_client as c; raise SystemExit(0 if c.ping() else 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 20s

  llm-worker:
    image: ${APP_IMAGE:-ai-system:latest}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["llm-async"]
    environment:
      REDIS_RUNTIME_ROLE: app
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:?set AWS_SECRETS_MANAGER_SECRET_ID}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-us-east-1}
    command: ["python", "-m", "app.scripts.llm_async_worker"]
    stop_grace_period: 20s

  eval-worker:
    image: ${APP_IMAGE:-ai-system:latest}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["eval-queue"]
    environment:
      REDIS_RUNTIME_ROLE: app
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:?set AWS_SECRETS_MANAGER_SECRET_ID}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-us-east-1}
    command: ["python", "-m", "app.scripts.eval_queue_worker"]
    stop_grace_period: 20s

  metrics-worker:
    image: ${APP_IMAGE:-ai-system:latest}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["metrics-queue"]
    environment:
      REDIS_RUNTIME_ROLE: app
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:?set AWS_SECRETS_MANAGER_SECRET_ID}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-us-east-1}
    command: ["python", "-m", "app.scripts.metrics_aggregation_worker"]
    volumes:
      - ./data/metrics:/app/data/metrics
    stop_grace_period: 20s

  gradio:
    image: ${GRADIO_IMAGE:-ai-system-gradio:latest}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles: ["gradio"]
    environment:
      REDIS_RUNTIME_ROLE: app
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:?set AWS_SECRETS_MANAGER_SECRET_ID}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-us-east-1}
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    volumes:
      - ./data/metrics:/app/data/metrics
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 20s
