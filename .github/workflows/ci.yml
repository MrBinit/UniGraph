name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  SECURITY_JWT_SECRET: "ci_jwt_secret_abcdefghijklmnopqrstuvwxyz123456"
  MEMORY_ENCRYPTION_KEY: "ci_memory_secret_abcdefghijklmnopqrstuvwxyz123"
  POSTGRES_PASSWORD: "ci_pg_password"
  MIDDLEWARE_ENABLE_TIMEOUT: "false"
  MIDDLEWARE_ENABLE_DISTRIBUTED_RATE_LIMIT: "false"
  MIDDLEWARE_ENABLE_DISTRIBUTED_BACKPRESSURE: "false"
  AWS_EC2_METADATA_DISABLED: "true"
  AWS_ACCESS_KEY_ID: "ci_dummy_access_key"
  AWS_SECRET_ACCESS_KEY: "ci_dummy_secret_key"
  AWS_DEFAULT_REGION: "us-east-1"
  BEDROCK_TIMEOUT: "5"
  POSTGRES_CONNECT_TIMEOUT_SECONDS: "2"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            requirements-prod.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Shell syntax check
        run: |
          for script in scripts/*.sh; do
            bash -n "${script}"
          done

      - name: Validate production compose render
        env:
          APP_IMAGE: "example.dkr.ecr.us-east-1.amazonaws.com/unigraph-app:ci"
          GRADIO_IMAGE: "example.dkr.ecr.us-east-1.amazonaws.com/unigraph-gradio:ci"
          AWS_SECRETS_MANAGER_SECRET_ID: "ci/placeholder"
          AWS_SECRETS_MANAGER_REGION: "us-east-1"
        run: |
          docker compose -f docker-compose.prod.yml config >/tmp/compose.prod.rendered.yml

      - name: Black
        run: black --check .

      - name: Flake8
        run: flake8 --max-line-length=100 --extend-ignore=E203,W503,E402,E501 app tests

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            requirements-prod.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-timeout

      - name: Run unit test shard
        run: |
          mapfile -t all_tests < <(ls tests/test_*.py | sort | grep -v '^tests/test_integration_pipeline.py$')
          shard_size=2
          selected_tests=()
          for i in "${!all_tests[@]}"; do
            if (( i % shard_size == ${{ matrix.shard }} )); then
              selected_tests+=("${all_tests[$i]}")
            fi
          done

          if [ ${#selected_tests[@]} -eq 0 ]; then
            echo "No tests assigned to shard ${{ matrix.shard }}"
            exit 1
          fi

          echo "Shard ${{ matrix.shard }} running ${#selected_tests[@]} test files"
          pytest -q --durations=25 --maxfail=1 --timeout=120 "${selected_tests[@]}"

  integration-tests:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            requirements-prod.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-timeout

      - name: Run integration tests
        run: pytest -q tests/test_integration_pipeline.py --durations=10 --maxfail=1 --timeout=300
