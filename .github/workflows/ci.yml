name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          SECURITY_JWT_SECRET: "ci-jwt-secret-at-least-32-characters-long"
          MEMORY_ENCRYPTION_KEY: "ci-memory-key-at-least-32-characters-long"
        run: |
          pytest -q
