name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO_APP: unigraph-app
  ECR_REPO_GRADIO: unigraph-gradio
  FRONTEND_S3_BUCKET: unigraph-frontend
  FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: EILC5TTHBL1C3

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      app_image: ${{ steps.images.outputs.app_image }}
      gradio_image: ${{ steps.images.outputs.gradio_image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ACTIONS_PAT || github.token }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "image_tag=sha-${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image (amd64)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t "${REGISTRY}/${ECR_REPO_APP}:${IMAGE_TAG}" \
            -t "${REGISTRY}/${ECR_REPO_APP}:latest" \
            --push .

      - name: Build and push gradio image (amd64)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.gradio \
            -t "${REGISTRY}/${ECR_REPO_GRADIO}:${IMAGE_TAG}" \
            -t "${REGISTRY}/${ECR_REPO_GRADIO}:latest" \
            --push .

      - name: Export image outputs
        id: images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          echo "app_image=${REGISTRY}/${ECR_REPO_APP}:${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "gradio_image=${REGISTRY}/${ECR_REPO_GRADIO}:${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET != '' && vars.FRONTEND_S3_BUCKET || 'unigraph-frontend' }}
      FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID != '' && vars.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID || 'EILC5TTHBL1C3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Validate frontend deploy inputs
        run: |
          set -euo pipefail
          if [[ -z "${FRONTEND_S3_BUCKET}" ]]; then
            echo "::error::FRONTEND_S3_BUCKET is empty. Set repo variable FRONTEND_S3_BUCKET."
            exit 1
          fi
          if [[ -z "${FRONTEND_CLOUDFRONT_DISTRIBUTION_ID}" ]]; then
            echo "::error::FRONTEND_CLOUDFRONT_DISTRIBUTION_ID is empty. Set repo variable FRONTEND_CLOUDFRONT_DISTRIBUTION_ID."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Deploy frontend to S3 + invalidate CloudFront
        env:
          AWS_REGION: ${{ vars.AWS_REGION || env.AWS_REGION }}
        run: |
          set -euo pipefail

          aws s3 sync frontend/dist "s3://${FRONTEND_S3_BUCKET}" --delete --cache-control "public,max-age=300"
          aws s3 cp frontend/dist/index.html "s3://${FRONTEND_S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

          if [[ -d frontend/dist/assets ]]; then
            aws s3 cp frontend/dist/assets "s3://${FRONTEND_S3_BUCKET}/assets" \
              --recursive \
              --cache-control "public,max-age=31536000,immutable"
          fi

          invalidation_id="$(
            aws cloudfront create-invalidation \
              --distribution-id "${FRONTEND_CLOUDFRONT_DISTRIBUTION_ID}" \
              --paths "/*" \
              --query 'Invalidation.Id' \
              --output text
          )"
          echo "Created CloudFront invalidation: ${invalidation_id}"

  deploy-ec2:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-push
    environment: production
    env:
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
    steps:
      - name: Configure AWS credentials (OIDC) for deploy host resolution
        if: ${{ env.EC2_INSTANCE_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Resolve EC2 SSH host from instance id
        if: ${{ env.EC2_INSTANCE_ID != '' }}
        id: resolve-ec2-host
        env:
          EC2_INSTANCE_ID: ${{ env.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          state="$(aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)"
          if [[ "${state}" != "running" ]]; then
            echo "::error::Instance ${EC2_INSTANCE_ID} is not running (state=${state})"
            exit 1
          fi

          public_ip="$(aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)"
          public_dns="$(aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].PublicDnsName' \
            --output text)"

          host=""
          if [[ -n "${public_dns}" && "${public_dns}" != "None" ]]; then
            host="${public_dns}"
          elif [[ -n "${public_ip}" && "${public_ip}" != "None" ]]; then
            host="${public_ip}"
          fi

          if [[ -z "${host}" ]]; then
            echo "::error::No public DNS/IP found for ${EC2_INSTANCE_ID}; cannot SSH from GitHub-hosted runner."
            exit 1
          fi

          echo "host=${host}" >> "${GITHUB_OUTPUT}"
          echo "Resolved deploy host: ${host}"

      - name: Validate deploy SSH inputs
        env:
          EC2_HOST: ${{ steps.resolve-ec2-host.outputs.host || secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_PORT: ${{ secrets.EC2_PORT || 22 }}
        run: |
          set -euo pipefail
          if [[ -z "${EC2_HOST}" ]]; then
            echo "::error::Missing required secret: EC2_HOST"
            exit 1
          fi
          if [[ -z "${EC2_USER}" ]]; then
            echo "::error::Missing required secret: EC2_USER"
            exit 1
          fi
          if [[ -z "${EC2_SSH_KEY}" ]]; then
            echo "::error::Missing required secret: EC2_SSH_KEY"
            exit 1
          fi
          if [[ -z "${EC2_PORT}" ]]; then
            echo "::error::EC2_PORT is empty"
            exit 1
          fi
          if [[ "${EC2_HOST}" == *:* ]]; then
            echo "::error::EC2_HOST must be only hostname/IP, without port"
            exit 1
          fi

      - name: Preflight SSH connectivity
        env:
          EC2_HOST: ${{ steps.resolve-ec2-host.outputs.host || secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || 22 }}
        run: |
          set -euo pipefail
          echo "Checking SSH TCP reachability to ${EC2_HOST}:${EC2_PORT}"
          for attempt in 1 2 3; do
            if timeout 8 bash -c "cat < /dev/null > /dev/tcp/${EC2_HOST}/${EC2_PORT}" 2>/dev/null; then
              echo "SSH TCP connectivity OK"
              exit 0
            fi
            echo "Attempt ${attempt}/3 failed; retrying in 10s..."
            sleep 10
          done
          echo "::error::Runner cannot reach ${EC2_HOST}:${EC2_PORT}. Check EC2 public IP/EIP, SG ingress, NACL, and route table."
          exit 1

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ needs.build-and-push.outputs.app_image }}
          GRADIO_IMAGE: ${{ needs.build-and-push.outputs.gradio_image }}
          AWS_REGION: ${{ vars.AWS_REGION || env.AWS_REGION }}
          AWS_SECRETS_MANAGER_REGION: ${{ vars.AWS_SECRETS_MANAGER_REGION || vars.AWS_REGION || env.AWS_REGION }}
          AWS_SECRETS_MANAGER_SECRET_ID: ${{ vars.AWS_SECRETS_MANAGER_SECRET_ID }}
          API_WORKERS: ${{ vars.API_WORKERS || '1' }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/home/ubuntu/AI-system-design' }}
        with:
          host: ${{ steps.resolve-ec2-host.outputs.host || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 120s
          command_timeout: 40m
          script_stop: true
          envs: APP_IMAGE,GRADIO_IMAGE,AWS_REGION,AWS_SECRETS_MANAGER_REGION,AWS_SECRETS_MANAGER_SECRET_ID,API_WORKERS,EC2_APP_DIR
          script: |
            set -euo pipefail

            if [[ "${EC2_APP_DIR}" == ~* ]]; then
              EC2_APP_DIR="${HOME}${EC2_APP_DIR:1}"
            fi

            cd "${EC2_APP_DIR}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            export AWS_DEFAULT_REGION="${AWS_REGION}"
            export AWS_SECRETS_MANAGER_REGION="${AWS_SECRETS_MANAGER_REGION:-${AWS_REGION}}"
            export API_WORKERS="${API_WORKERS:-1}"

            if [[ -z "${AWS_SECRETS_MANAGER_SECRET_ID:-}" ]]; then
              echo "AWS_SECRETS_MANAGER_SECRET_ID is required"
              exit 1
            fi

            ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
            ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            aws ecr get-login-password --region "${AWS_REGION}" \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            # Avoid pull failures on small EC2 root volumes by pruning Docker when disk is low.
            DISK_PATH="/var/lib/containerd"
            if [[ ! -d "${DISK_PATH}" ]]; then
              DISK_PATH="/var/lib/docker"
            fi
            if [[ ! -d "${DISK_PATH}" ]]; then
              DISK_PATH="/var/lib"
            fi

            echo "Disk usage before deploy:"
            df -h / "${DISK_PATH}" || true
            docker system df || true

            avail_mb="$(df -Pm "${DISK_PATH}" | awk 'NR==2 {print $4}')"
            if [[ -n "${avail_mb}" ]] && [[ "${avail_mb}" -lt 6144 ]]; then
              echo "Low disk detected (${avail_mb}MB free). Running Docker prune..."
              docker container prune -f || true
              docker image prune -af || true
              docker builder prune -af || true
              docker network prune -f || true
            fi

            avail_mb_after="$(df -Pm "${DISK_PATH}" | awk 'NR==2 {print $4}')"
            echo "Available space after prune: ${avail_mb_after}MB"
            if [[ -n "${avail_mb_after}" ]] && [[ "${avail_mb_after}" -lt 3072 ]]; then
              echo "Insufficient free space for image pull (<3GB)."
              exit 1
            fi

            mkdir -p data/metrics
            chown "$(id -u):$(id -g)" data/metrics || true
            chmod 775 data/metrics || true

            docker compose -f docker-compose.prod.yml --profile gradio pull api gradio
            docker compose -f docker-compose.prod.yml --profile gradio --profile llm-async --profile eval-queue --profile metrics-queue up -d api worker llm-worker gradio eval-worker metrics-worker
            docker compose -f docker-compose.prod.yml --profile gradio --profile llm-async --profile eval-queue --profile metrics-queue ps

            wait_for_url() {
              local url="$1"
              local max_attempts="$2"
              local sleep_seconds="$3"
              local name="$4"
              local attempt=1
              while [[ "${attempt}" -le "${max_attempts}" ]]; do
                if curl --max-time 10 -fsS "${url}" >/dev/null; then
                  echo "${name} is ready (${url})"
                  return 0
                fi
                echo "Waiting for ${name} (${attempt}/${max_attempts})..."
                sleep "${sleep_seconds}"
                attempt=$((attempt + 1))
              done
              echo "${name} failed health check: ${url}"
              docker compose -f docker-compose.prod.yml --profile gradio --profile llm-async --profile eval-queue --profile metrics-queue ps
              docker compose -f docker-compose.prod.yml --profile gradio --profile llm-async --profile eval-queue --profile metrics-queue logs --tail=200 api worker llm-worker gradio eval-worker metrics-worker || true
              return 1
            }

            wait_for_url "http://127.0.0.1:8000/healthz" 18 5 "api"
            wait_for_url "http://127.0.0.1:7860" 24 5 "gradio"
