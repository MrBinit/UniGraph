postgres:
  enabled: false
  host: "localhost"
  port: 5432
  database: "postgres"
  username: "postgres"
  ssl_mode: "disable"
  min_pool_size: 1
  max_pool_size: 10
  connect_timeout_seconds: 10
  app_name: "unigraph"
  schema_name: "unigraph"
  memory_table: "long_term_memory"
  chunk_table: "document_chunks"
  embedding_dimensions: 1024
  default_top_k: 2
  vector_index_type: "hnsw"
  ivfflat_lists: 100
  hnsw_m: 16
  hnsw_ef_construction: 64
